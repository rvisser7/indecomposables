# Workflow to build, test, and lint the indecomposables project
#
# This workflow:
# 1. Lints Python code with flake8
# 2. Runs minimal fast tests (no Sage required)
# 3. Runs full test suite with Sage (using conda)
#
# Based on LMFDB's approach for Sage in CI

name: Tests and Linting

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  # Job 1: Linting and basic syntax checks
  lint:
    name: Lint and Syntax Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest

    - name: Lint with flake8 - stop on critical errors
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Lint with flake8 - all warnings
      run: |
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 scripts/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

    - name: Check Python syntax
      run: |
        python -m py_compile scripts/main.py
        python -m py_compile scripts/real_quadratic.py
        python -m py_compile scripts/simplest_cubic.py
        python -m py_compile scripts/demo_real_quadratic.py
        python -m py_compile scripts/demo_simplest_cubic.py
        python -m py_compile tests/test_main.py
        python -m py_compile tests/test_real_quadratic.py
        python -m py_compile tests/test_simplest_cubic.py
    
    - name: Check Python syntax
      run: |
        python -m py_compile scripts/main.py
        python -m py_compile scripts/real_quadratic.py
        python -m py_compile scripts/simplest_cubic.py
        python -m py_compile scripts/demo_real_quadratic.py
        python -m py_compile scripts/demo_simplest_cubic.py
        python -m py_compile tests/test_main.py
        python -m py_compile tests/test_real_quadratic.py
        python -m py_compile tests/test_simplest_cubic.py

  # Job 2: Fast minimal tests (no Sage required)
  test-minimal:
    name: Minimal Tests (Fast)
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    
    - name: Install test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
    
    - name: Run minimal tests (syntax and imports only)
      run: |
        python -m pytest tests/ -v -k "minimal"

  # Job 3: Full tests with Sage
  test-sage:
    name: Full Tests with Sage
    runs-on: ubuntu-latest

    # Use the official Sage Docker image
    container:
      image: sagemath/sagemath:latest
      options: --user root

    steps:
    - name: Install test dependencies
      run: |
        apt-get update -qq
        apt-get install -y python3-pytest python3-pytest-cov git

    - uses: actions/checkout@v4

    - name: Set up Sage environment
      run: |
        # Make sure we're using the right Python
        export PYTHONPATH=/home/sage/sage/local/lib/python3.10/site-packages:$PYTHONPATH
        export PATH=/home/sage/sage:$PATH

        # Verify Sage is working
        sage --version

    - name: Run full test suite with Sage
      run: |
        # Use Sage's Python environment
        export PYTHONPATH=/home/sage/sage/local/lib/python3.10/site-packages:$PYTHONPATH
        export PATH=/home/sage/sage:$PATH

        # Verify Sage environment
        sage --version
        which sage

        cd /__w/indecomposables/indecomposables

        # Run tests through tox (uses sage -python internally)
        tox -e tests -- -k "not slow" --maxfail=5

# Job 4: Code coverage using conda (LMFDB-style)
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: conda-incubator/setup-miniconda@v2
      with:
        activate-environment: indecomposables
        auto-activate-base: false
        channel-priority: strict
        use-only-tar-bz2: false

    - name: Cache conda
      uses: actions/cache@v3
      id: condacache
      env:
        CACHE_NUMBER: 0
      with:
        path: |
          /usr/share/miniconda/envs/indecomposables
        key:
          ${{ runner.os }}-conda-${{ env.CACHE_NUMBER }}-${{
          hashFiles('.environment.yml') }}

    - name: Create/update conda environment
      if: steps.condacache.outputs.cache-hit != 'true'
      run: conda env create -f .environment.yml || conda env update -f .environment.yml

    - name: Cache pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          ${{ runner.os }}-

    - name: Install Python dependencies
      shell: bash -l {0}
      run: |
        sage -pip install -r requirements-dev.txt

    - name: Generate coverage report
      shell: bash -l {0}
      run: |
        sage -python -m pytest tests/ -v --tb=short --cov=scripts --cov-report=xml --cov-report=term --maxfail=3 -k "not slow"

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
