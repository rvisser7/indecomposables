[pytest]
# pytest configuration for indecomposables

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers for running different test suites
markers =
    minimal: Fast tests that run without Sage (for CI)
    full: Full tests with Sage computations
    slow: Slow tests (e.g., large field computations)
    dress_scharlau: Tests for Dress-Scharlau algorithm (real quadratic fields)
    kala_tinkova: Tests for Kala-Tinková classification (simplest cubic fields)
    brute_force: Tests for brute force algorithm
    comparison: Tests comparing different algorithms
    integration: Tests for integration between components
    integration: Integration tests
    comparison: Tests that compare different algorithms
    dress_scharlau: Tests for Dress-Scharlau method
    brute_force: Tests for brute force method

testpaths = tests
